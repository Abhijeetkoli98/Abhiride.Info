version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: abhiride_postgres
    restart: always
    environment:
      POSTGRES_USER: abhiride_user
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: abhiride_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: abhiride_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: abhiride_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: "postgresql://abhiride_user:securepassword@postgres:5432/abhiride_db?schema=public"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: abhiride_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
    depends_on:
      - backend

volumes:
  pgdata:
